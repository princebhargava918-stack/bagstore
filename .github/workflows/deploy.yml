name: CI / CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PHP Syntax Check
        run: |
          find . -name "*.php" -not -path "./wp-content/plugins/*" -not -path "./wp-content/themes/twentytwenty*" -print0 | xargs -0 -n 1 php -l

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/html/bagstore
            git pull origin main
            # If you have any build steps or cache clearing, add them here
            # e.g., wp cache flush --allow-root
